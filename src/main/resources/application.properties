spring.application.name=news-api
management.endpoints.web.exposure.include=health

spring.docker.compose.enabled=false

spring.r2dbc.url=${DB_URL}
spring.r2dbc.username=${DB_USERNAME}
spring.r2dbc.password=${DB_PASSWORD}

spring.r2dbc.pool.initial-size=5
spring.r2dbc.pool.max-size=20
spring.r2dbc.pool.max-idle-time=3m
spring.r2dbc.pool.max-life-time=15m
spring.r2dbc.pool.validation-query=SELECT 1

jwt.secret=${JWT_SECRET}

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${SMTP_USERNAME}
spring.mail.password=${SMTP_PASSWORD}
app.mail.frontend-verify-email-url=${VERIFY_URL}
app.mail.frontend-change-password-url=${RESET_URL}

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000
spring.mail.default-encoding=UTF-8

app.security.reset-pepper=${SECURITY_PEPPER}

server.forward-headers-strategy=framework
