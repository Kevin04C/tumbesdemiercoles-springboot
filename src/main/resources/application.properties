# Pool de conexiones reactivas R2DBC
# initial-size: conexiones que abre al arrancar
# max-size: tope máximo de conexiones concurrentes
# max-idle-time: descarta conexiones idle antes de que el servidor las cierre (evita Connection reset)
# max-life-time: fuerza renovación periódica para evitar conexiones vetustas
# validation-query: verifica que la conexión esté viva antes de entregarla; si falla, la reemplaza
spring.r2dbc.pool.initial-size=5
spring.r2dbc.pool.max-size=20
spring.r2dbc.pool.max-idle-time=3m
spring.r2dbc.pool.max-life-time=15m
spring.r2dbc.pool.validation-query=SELECT 1

