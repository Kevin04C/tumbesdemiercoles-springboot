# --- CONFIGURACION DE PRODUCCION (AUTO-SANACION) ---
# 1. Tiempo maximo que una conexion puede estar inactiva en el pool antes de ser destruida y reciclada (en minutos)
spring.r2dbc.pool.max-idle-time=30m
# 2. Tiempo de vida maximo absoluto de una conexion. Evita que conexiones de dias enteros generen fugas de memoria.
spring.r2dbc.pool.max-life-time=60m
# 3. Tiempo maximo que el sistema esperara para conseguir una conexion antes de lanzar el error (en milisegundos)
spring.r2dbc.pool.max-acquire-time=10000
# 4. Consulta rapida de validacion. Spring preguntara "estas vivo?" a PostgreSQL antes de darle la conexion a tu app
spring.r2dbc.pool.validation-query=SELECT 1

