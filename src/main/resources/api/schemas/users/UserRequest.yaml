type: object
required:
  - firstName
  - lastName
  - userEmail
  - password
properties:
  firstName:
    type: string
    example: Juan Carlos
  lastName:
    type: string
    example: Pérez
  userEmail:
    type: string
    format: email
    example: juan.perez@email.com
  password:
    type: string
    format: password
    description: Contraseña en texto plano que será hasheada por el backend.
    example: "S3cur3P@ssw0rd!"
  userImageUrl:
    type: string
    format: uri
    example: "https://miservidor.com/avatar.jpg"