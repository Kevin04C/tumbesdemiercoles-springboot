type: object
properties:
  userId:
    type: string
    format: uuid
    example: "123e4567-e89b-12d3-a456-426614174000"
  firstName:
    type: string
    example: Juan Carlos
  lastName:
    type: string
    example: Pérez
  userEmail:
    type: string
    format: email
    example: juan.perez@email.com
  userImageUrl:
    type: string
    format: uri
    example: "https://miservidor.com/avatar.jpg"
  emailVerified:
    type: boolean
    example: false