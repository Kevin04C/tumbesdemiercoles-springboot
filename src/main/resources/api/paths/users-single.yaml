get:
  tags:
    - Usuarios
  summary: Buscar por ID
  operationId: getUserById
  parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
  responses:
    '200':
      description: Usuario encontrado
      content:
        application/json:
          schema:
            $ref: '../schemas/users/UserResponse.yaml'
    '404':
      description: Usuario no encontrado