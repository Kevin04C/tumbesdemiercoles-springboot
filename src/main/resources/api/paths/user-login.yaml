post:
  tags:
    - Autenticacion
  summary: Iniciar Sesion
  operationId: login
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: '../schemas/login/LoginRequest.yaml'
  responses:
    '200':
      description: Autenticación exitosa
      content:
        application/json:
          schema:
            $ref: '../schemas/login/LoginResponse.yaml'
    '401':
      description: Credenciales inválidas
