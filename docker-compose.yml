services:
  news-api:
    build: .
    container_name: tumbesdemiercoles-api
    restart: unless-stopped
    ports:
      - "8081:8080"
    env_file: .env
    environment:
      - TZ=America/Lima
    deploy:
      resources:
        limits:
          memory: 1G
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 30s
