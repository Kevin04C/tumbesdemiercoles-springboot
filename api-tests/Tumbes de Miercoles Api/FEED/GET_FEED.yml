info:
  name: GET_FEED
  type: http
  seq: 1

http:
  method: GET
  url: "{{url}}/api/v1/feed"
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  # 📌 Endpoint: GET_FEED
  
  ## 📝 Descripción
  Carga de forma masiva y reactiva todo el contenido necesario para pintar la pantalla de inicio del portal de noticias (Sección Carrusel, Noticias del Perú, Últimas Noticias, Columnas destacadas y último Semanario).
  
  ## 🌐 Detalles Técnicos
  - **Método HTTP**: `GET`
  - **Ruta/Endpoint**: `"{{url}}/api/v1/feed"`
  - **Autenticación**: Público (Lectura rápida optimizada)
  
  ## ⚙️ Parámetros y Filtros
  Ninguno
  
  ## 📦 Cuerpo de la Petición (Request Body)
  Ninguno
  
  ## 📤 Respuesta (Response)
  Objeto compuesto `FeedResponse` conteniendo múltiples listas estructuradas listas para pintar.
