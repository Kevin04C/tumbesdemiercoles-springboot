docs: |-
  # 📌 Endpoint: REGISTER_USER
  
  ## 📝 Descripción
  Crea una nueva cuenta de usuario con rol predeterminado y dispara el correo de verificación.
  
  ## 🌐 Detalles Técnicos
  - **Método HTTP**: `POST`
  - **Ruta/Endpoint**: `"{{url}}/api/v1/auth/register"`
  - **Autenticación**: Público (Ninguna)
  
  ## ⚙️ Parámetros y Filtros
  Ninguno
  
  ## 📦 Cuerpo de la Petición (Request Body)
  - `firstName`: Nombre(s) del usuario.
  - `lastName`: Apellido(s) del usuario.
  - `email`: Correo único.
  - `password`: Contraseña.
  - `userName`: Nombre de usuario único.
  - `imageUrl` (Opcional): URL de foto de perfil.
  
  ## 📤 Respuesta (Response)
  Detalle del usuario creado y tokens JWT iniciales (`accessToken` y `refreshToken`).
