info:
  name: REFRESH_SESSION
  type: http
  seq: 3

http:
  method: POST
  url: "{{url}}/api/v1/auth/refresh"
  body:
    type: json
    data: |-
      {
        "refreshToken": "tu_refresh_token_aqui"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  # 📌 Endpoint: REFRESH_SESSION
  
  ## 📝 Descripción
  Renueva el token de acceso JWT utilizando el token de refresco.
  
  ## 🌐 Detalles Técnicos
  - **Método HTTP**: `POST`
  - **Ruta/Endpoint**: `"{{url}}/api/v1/auth/refresh"`
  - **Autenticación**: Público (Ninguna)
  
  ## ⚙️ Parámetros y Filtros
  Ninguno
  
  ## 📦 Cuerpo de la Petición (Request Body)
  - `refreshToken`: Token de refresco obtenido en el Login/Registro.
  
  ## 📤 Respuesta (Response)
  Nuevo par de tokens JWT (`accessToken` y `refreshToken`).
