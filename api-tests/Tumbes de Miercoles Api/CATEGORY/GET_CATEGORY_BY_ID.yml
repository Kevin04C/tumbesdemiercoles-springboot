  # 📌 Endpoint: GET_CATEGORY_BY_ID
  
  ## 📝 Descripción
  Recupera la información de una categoría específica por su identificador UUID.
  
  ## 🌐 Detalles Técnicos
  - **Método HTTP**: `GET`
  - **Ruta/Endpoint**: `"{{url}}/api/v1/categories/b38740e3-c409-4916-9a28-090d220256ab"`
  - **Autenticación**: Público / Lectura general
  
  ## ⚙️ Parámetros y Filtros
  - `id` (Path Variable): Identificador único UUID de la categoría.
  
  ## 📦 Cuerpo de la Petición (Request Body)
  Ninguno
  
  ## 📤 Respuesta (Response)
  Detalle de la categoría solicitada.
