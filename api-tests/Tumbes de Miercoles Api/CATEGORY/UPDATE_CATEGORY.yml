docs: |-
  # 📌 Endpoint: UPDATE_CATEGORY
  
  ## 📝 Descripción
  Modifica los datos de una categoría de noticias (descripción, estado activo y asociación padre).
  
  ## 🌐 Detalles Técnicos
  - **Método HTTP**: `PUT`
  - **Ruta/Endpoint**: `"{{url}}/api/v1/categories/b38740e3-c409-4916-9a28-090d220256ab"`
  - **Autenticación**: Requerido (Bearer Token JWT - Rol Administrador)
  
  ## ⚙️ Parámetros y Filtros
  - `id` (Path Variable): ID de la categoría a actualizar.
  
  ## 📦 Cuerpo de la Petición (Request Body)
  - `descripcion`: Nombre descriptivo.
  - `isActive`: Estado lógico de la categoría.
  - `categoryId` (Opcional): UUID de la categoría padre (para anidamiento).
  
  ## 📤 Respuesta (Response)
  Objeto de la categoría con los cambios aplicados.
