docs: |-
  # 📌 Endpoint: GET_CATEGORY_TREE
  
  ## 📝 Descripción
  Recupera la estructura jerárquica de árbol de categorías activas (categorías padres con sus subcategorías anidadas).
  
  ## 🌐 Detalles Técnicos
  - **Método HTTP**: `GET`
  - **Ruta/Endpoint**: `"{{url}}/api/v1/categories/tree"`
  - **Autenticación**: Público / Lectura general
  
  ## ⚙️ Parámetros y Filtros
  Ninguno
  
  ## 📦 Cuerpo de la Petición (Request Body)
  Ninguno (Petición GET)
  
  ## 📤 Respuesta (Response)
  Lista de categorías principales conteniendo recursivamente su lista de subcategorías.
