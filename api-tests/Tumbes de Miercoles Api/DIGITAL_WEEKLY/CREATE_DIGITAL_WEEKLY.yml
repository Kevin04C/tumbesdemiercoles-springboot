docs: |-
  # 📌 Endpoint: CREATE_DIGITAL_WEEKLY
  
  ## 📝 Descripción
  Publica una nueva edición del semanario digital PDF en la plataforma.
  
  ## 🌐 Detalles Técnicos
  - **Método HTTP**: `POST`
  - **Ruta/Endpoint**: `"{{url}}/api/v1/digital-weekly"`
  - **Autenticación**: Requerido (Bearer Token JWT - Rol Admin / Editor)
  
  ## ⚙️ Parámetros y Filtros
  Ninguno
  
  ## 📦 Cuerpo de la Petición (Request Body)
  - `pdfUrl`: Enlace de descarga del PDF.
  - `frontPageImageUrl`: Enlace de la imagen de portada.
  - `descripcion`: Número de edición o título descriptivo.
  - `isActive` / `isPremium` / `url` (Enlaces secundarios).
  
  ## 📤 Respuesta (Response)
  Detalles del semanario registrado.
