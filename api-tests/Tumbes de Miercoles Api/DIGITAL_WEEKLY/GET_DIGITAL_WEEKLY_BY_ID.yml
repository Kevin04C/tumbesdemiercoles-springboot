  # 📌 Endpoint: GET_DIGITAL_WEEKLY_BY_ID
  
  ## 📝 Descripción
  Recupera los datos de una edición del semanario digital por su ID.
  
  ## 🌐 Detalles Técnicos
  - **Método HTTP**: `GET`
  - **Ruta/Endpoint**: `"{{url}}/api/v1/digital-weekly/25dec80c-c531-47d5-96aa-f7397bf933d7"`
  - **Autenticación**: Público (o restrictivo según premium)
  
  ## ⚙️ Parámetros y Filtros
  - `id` (Path Variable): UUID de la edición semanal.
  
  ## 📦 Cuerpo de la Petición (Request Body)
  Ninguno
  
  ## 📤 Respuesta (Response)
  Detalle del semanario digital.
