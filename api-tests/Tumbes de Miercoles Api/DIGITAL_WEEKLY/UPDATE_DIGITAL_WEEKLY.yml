  # 📌 Endpoint: UPDATE_DIGITAL_WEEKLY
  
  ## 📝 Descripción
  Actualiza la información, portadas o enlaces de una edición de semanario.
  
  ## 🌐 Detalles Técnicos
  - **Método HTTP**: `PUT`
  - **Ruta/Endpoint**: `"{{url}}/api/v1/digital-weekly/25dec80c-c531-47d5-96aa-f7397bf933d7"`
  - **Autenticación**: Requerido (Bearer Token JWT - Rol Administrador)
  
  ## ⚙️ Parámetros y Filtros
  - `id` (Path Variable): ID del semanario a editar.
  
  ## 📦 Cuerpo de la Petición (Request Body)
  Campos del semanario (pdfUrl, frontPageImageUrl, descripcion, isActive, isPremium).
  
  ## 📤 Respuesta (Response)
  Edición modificada.
