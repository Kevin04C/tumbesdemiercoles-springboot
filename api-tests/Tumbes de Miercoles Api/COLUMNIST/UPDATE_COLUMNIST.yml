docs: |-
  # 📌 Endpoint: UPDATE_COLUMNIST
  
  ## 📝 Descripción
  Edita el contenido o autoría de una columna de opinión existente.
  
  ## 🌐 Detalles Técnicos
  - **Método HTTP**: `PUT`
  - **Ruta/Endpoint**: `"{{url}}/api/v1/columnist/a82288d6-01c0-458d-a729-9a1e5cf907e4"`
  - **Autenticación**: Requerido (Bearer Token JWT - Rol Editor / Admin)
  
  ## ⚙️ Parámetros y Filtros
  - `id` (Path Variable): ID de la columna.
  
  ## 📦 Cuerpo de la Petición (Request Body)
  Campos de columna (content, author, title, headline, authorImageUrl, isActive).
  
  ## 📤 Respuesta (Response)
  Columna modificada.
