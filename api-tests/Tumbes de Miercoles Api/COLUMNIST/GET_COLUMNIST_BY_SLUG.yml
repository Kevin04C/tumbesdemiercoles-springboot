docs: |-
  # 📌 Endpoint: GET_COLUMNIST_BY_SLUG
  
  ## 📝 Descripción
  Recupera una columna de opinión mediante su slug único.
  
  ## 🌐 Detalles Técnicos
  - **Método HTTP**: `GET`
  - **Ruta/Endpoint**: `"{{url}}/api/v1/columnist/slug/algo"`
  - **Autenticación**: Público
  
  ## ⚙️ Parámetros y Filtros
  - `slug` (Path Variable): Slug único de la columna.
  
  ## 📦 Cuerpo de la Petición (Request Body)
  Ninguno
  
  ## 📤 Respuesta (Response)
  Detalle y contenido completo de la columna de opinión.
