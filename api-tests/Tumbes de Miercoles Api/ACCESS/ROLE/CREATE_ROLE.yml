info:
  name: CREATE_ROLE
  type: http
  seq: 3

http:
  method: POST
  url: "{{url}}/api/v1/roles"
  body:
    type: json
    data: |-
      {
        "name": "USER",
        "description": "rol de Usuario"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  # 📌 Endpoint: CREATE_ROLE
  
  ## 📝 Descripción
  Declara un nuevo Rol del sistema.
  
  ## 🌐 Detalles Técnicos
  - **Método HTTP**: `POST`
  - **Ruta/Endpoint**: `"{{url}}/api/v1/roles"`
  - **Autenticación**: Requerido (Bearer Token JWT - Rol SuperAdmin)
  
  ## ⚙️ Parámetros y Filtros
  Ninguno
  
  ## 📦 Cuerpo de la Petición (Request Body)
  - `name`: Nombre del rol (ej: `REDACTOR`).
  
  ## 📤 Respuesta (Response)
  Detalles del Rol creado.
