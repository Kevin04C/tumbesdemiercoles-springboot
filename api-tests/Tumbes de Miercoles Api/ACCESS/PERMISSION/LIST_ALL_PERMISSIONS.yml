docs: |-
  # 📌 Endpoint: LIST_ALL_PERMISSIONS
  
  ## 📝 Descripción
  Retorna todos los permisos declarados en la base de datos.
  
  ## 🌐 Detalles Técnicos
  - **Método HTTP**: `GET`
  - **Ruta/Endpoint**: `"{{url}}/api/v1/permissions"`
  - **Autenticación**: Requerido (Bearer Token JWT - Rol Admin)
  
  ## ⚙️ Parámetros y Filtros
  Ninguno
  
  ## 📦 Cuerpo de la Petición (Request Body)
  Ninguno
  
  ## 📤 Respuesta (Response)
  Lista de permisos disponibles.
