  # 📌 Endpoint: REVOKE_ROLE_PERMISSION
  
  ## 📝 Descripción
  Elimina la asociación por defecto de un permiso con un rol.
  
  ## 🌐 Detalles Técnicos
  - **Método HTTP**: `DELETE`
  - **Ruta/Endpoint**: `"{{url}}/api/v1/roles/30ecc70b-533d-41a9-917f-1c8e1bda6f03/permissions/92960200-6e95-4f49-bfcf-7456641111b2"`
  - **Autenticación**: Requerido (Bearer Token JWT - Rol SuperAdmin)
  
  ## ⚙️ Parámetros y Filtros
  - `roleId` (Path Variable): ID del rol.
  - `permissionId` (Path Variable): ID del permiso a revocar.
  
  ## 📦 Cuerpo de la Petición (Request Body)
  Ninguno
  
  ## 📤 Respuesta (Response)
  Confirmación.
