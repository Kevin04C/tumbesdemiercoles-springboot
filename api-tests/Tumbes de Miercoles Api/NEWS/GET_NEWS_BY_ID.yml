docs: |-
  # 📌 Endpoint: GET_NEWS_BY_ID
  
  ## 📝 Descripción
  Obtiene la información y el cuerpo completo de un artículo de noticia por ID.
  
  ## 🌐 Detalles Técnicos
  - **Método HTTP**: `GET`
  - **Ruta/Endpoint**: `"{{url}}/api/v1/news/2f27c649-cfe6-4999-a187-a0f9cda923b5"`
  - **Autenticación**: Público (El contenido puede encriptarse o cortarse si es premium y el usuario no está suscrito)
  
  ## ⚙️ Parámetros y Filtros
  - `id` (Path Variable): UUID de la noticia.
  
  ## 📦 Cuerpo de la Petición (Request Body)
  Ninguno
  
  ## 📤 Respuesta (Response)
  Detalle completo de la noticia.
