docs: |-
  # 📌 Endpoint: LIST_NEWS
  
  ## 📝 Descripción
  Filtra, pagina y ordena noticias de la plataforma.
  
  ## 🌐 Detalles Técnicos
  - **Método HTTP**: `GET`
  - **Ruta/Endpoint**: `"{{url}}/api/v1/news?page=0&size=10&sortDir=DESC&sortBy=createdAt"`
  - **Autenticación**: Público (Lectura general)
  
  ## ⚙️ Parámetros y Filtros
  - `categoryId` (Query, Opcional): Filtrar por categoría.
  - `isPremium` (Query, Opcional): Filtrar por de pago.
  - `isActive` (Query, Opcional): Estado activo/borrador.
  - Parámetros de paginación (`page`, `size`, `sortBy`, `sortDir`).
  
  ## 📦 Cuerpo de la Petición (Request Body)
  Ninguno
  
  ## 📤 Respuesta (Response)
  Lista paginada de artículos de noticias.
