docs: |-
  # 📌 Endpoint: UPDATE_NEWS
  
  ## 📝 Descripción
  Modifica un artículo de noticia.
  
  ## 🌐 Detalles Técnicos
  - **Método HTTP**: `PUT`
  - **Ruta/Endpoint**: `"{{url}}/api/v1/news/2f27c649-cfe6-4999-a187-a0f9cda923b5"`
  - **Autenticación**: Requerido (Bearer Token JWT - Rol Redactor / Admin)
  
  ## ⚙️ Parámetros y Filtros
  - `id` (Path Variable): ID de la noticia a modificar.
  
  ## 📦 Cuerpo de la Petición (Request Body)
  Campos del artículo a actualizar (título, contenido, categoría, imagen, banderas de visibilidad).
  
  ## 📤 Respuesta (Response)
  Detalle del artículo modificado.
