docs: |-
  # 📌 Endpoint: GET_NEWS_BY_CATEGORY_SLUG
  
  ## 📝 Descripción
  Lista de forma paginada y ordenada las noticias asociadas a una categoría mediante su slug.
  
  ## 🌐 Detalles Técnicos
  - **Método HTTP**: `GET`
  - **Ruta/Endpoint**: `"{{url}}/api/v1/news/by-category/locales"`
  - **Autenticación**: Público
  
  ## ⚙️ Parámetros y Filtros
  - `categorySlug` (Path Variable): Slug de la categoría.
  - Parámetros de paginación.
  
  ## 📦 Cuerpo de la Petición (Request Body)
  Ninguno
  
  ## 📤 Respuesta (Response)
  Lista paginada de noticias de la categoría.
