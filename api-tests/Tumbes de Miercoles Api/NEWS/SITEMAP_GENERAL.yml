docs: |-
  # 📌 Endpoint: SITEMAP_GENERAL
  
  ## 📝 Descripción
  Retorna información resumida (slug, fecha de actualización) para indexadores web (sitemap.xml).
  
  ## 🌐 Detalles Técnicos
  - **Método HTTP**: `GET`
  - **Ruta/Endpoint**: `"{{url}}/api/v1/sitemap/general"`
  - **Autenticación**: Público (Herramientas SEO)
  
  ## ⚙️ Parámetros y Filtros
  Ninguno
  
  ## 📦 Cuerpo de la Petición (Request Body)
  Ninguno
  
  ## 📤 Respuesta (Response)
  Colección de registros con `slug` y `updatedAt`.
