  # 📌 Endpoint: GET_NEWS_BY_SLUG
  
  ## 📝 Descripción
  Busca una noticia por su slug amigable.
  
  ## 🌐 Detalles Técnicos
  - **Método HTTP**: `GET`
  - **Ruta/Endpoint**: `"{{url}}/api/v1/news/slug/en-el-vecino-pais-aseguran-que-la-enfermedad-esta-controlada"`
  - **Autenticación**: Público
  
  ## ⚙️ Parámetros y Filtros
  - `slug` (Path Variable): Slug único del artículo.
  
  ## 📦 Cuerpo de la Petición (Request Body)
  Ninguno
  
  ## 📤 Respuesta (Response)
  Detalle completo de la noticia.
