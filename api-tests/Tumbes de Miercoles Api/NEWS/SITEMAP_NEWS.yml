docs: |-
  # 📌 Endpoint: SITEMAP_NEWS
  
  ## 📝 Descripción
  Retorna artículos de noticias de las últimas 48 horas optimizados para la integración de Google News.
  
  ## 🌐 Detalles Técnicos
  - **Método HTTP**: `GET`
  - **Ruta/Endpoint**: `"{{url}}/api/v1/sitemap/news"`
  - **Autenticación**: Público (Herramientas SEO)
  
  ## ⚙️ Parámetros y Filtros
  Ninguno
  
  ## 📦 Cuerpo de la Petición (Request Body)
  Ninguno
  
  ## 📤 Respuesta (Response)
  Colección de registros con slugs, títulos, imágenes y fechas de publicación reciente.
